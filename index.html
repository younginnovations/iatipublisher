<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .accordion {
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .accordion-item {
      border-bottom: 1px solid #ccc;
    }

    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background-color: #f1f1f1;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding: 0 15px;
    }

    .accordion-content p {
      margin: 15px 0;
    }

    .im-outside {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding: 0 15px;
    }

    .toggle-btn {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 3px;
      transition: background-color 0.3s ease;
    }

    .toggle-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
<div class="accordion">
  <div class="accordion-item">
    <div class="accordion-header">
      <span>Item 1</span>
      <button class="toggle-btn">Toggle</button>
    </div>
    <div class="accordion-content">
      <p>This is the content of item 1.</p>
      <p>This is the content of item 12.</p>
    </div>
    <p class="im-outside">This is the content of item outside the accordion-content.</p>
  </div>
</div>

<script>
  document.querySelectorAll('.toggle-btn').forEach(button => {
    button.addEventListener('click', () => {
      const header = button.parentElement;
      const content = header.nextElementSibling;
      const outsideContent = content.nextElementSibling;

      content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
      content.style.padding = content.style.padding ? null : "15px 15px";

      if (outsideContent && outsideContent.classList.contains('im-outside')) {
        outsideContent.style.maxHeight = outsideContent.style.maxHeight ? null : outsideContent.scrollHeight + "px";
        outsideContent.style.padding = outsideContent.style.padding ? null : "15px 15px";
      }

      button.classList.toggle('active');
    });
  });
</script>
</body>
</html>
